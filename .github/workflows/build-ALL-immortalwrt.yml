# =========================================================================================
# 🎓【初二小白课堂：源码阅读与赏析】- 终极单文件同源阵列 (build-ALL)
# 
# 📘【剧本背景】：
# 这是一份汇聚了宇宙精华的【极化单体架构】。
# 我们摒弃了微服务那些杂乱的花里胡哨的文件堆叠，把所有的底层逻辑（搜寻硬盘、清空缓存王座）重新封装进了这一个文件。
# 同时，又完美继承了“同源吃老本（先编译Taiyi造好整个C底层世界，再用几分钟帮Yashe白嫖完工）”的高速红利！
#
# 🕵️‍♂️【作者意图】：
# 把所有的 Bash 脚本原封不动拉回了 YAML 当中，以 `run: |` 的形式强行内联。
# 代码可能很长，但是它极度独立，拿走这一个文件，走遍天下都不怕！
# =========================================================================================

name: ✨ Build ALL Optional (Taiyi & Yashe) 单体串行快线

on:
  repository_dispatch:
  schedule:
    - cron: '0 18 2,16 * *'
  workflow_dispatch:
    inputs:
      build_taiyi:
        description: "🔥 是否出锅 Taiyi 机型固件？ (开路先锋：负责造底座) 🚀"
        required: true
        type: boolean
        default: true
      build_yashe:
        description: "🔥 是否出锅 Yashe 机型固件？ (光速出锅：白嫖完备底座) 🚀"
        required: true
        type: boolean
        default: true
      use_ccache:
        description: "🧲 读取并共用 ccache 金库大还丹？"
        required: false
        type: boolean
        default: true

env:
  REPO_URL: https://github.com/VIKINGYFY/immortalwrt.git
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build_combo:
    name: 🏭 同源架构双子星串行厂
    # 只要勾选了其中任意一个机器，我们就启动主线大巴车
    if: github.event.inputs.build_taiyi == 'true' || github.event.inputs.build_yashe == 'true' || github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout # 1️⃣：去代码仓库提取所有的核心剧本
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu) # 2️⃣：内联 Bash —— 强力大妈打扫厂房
        run: |
          echo "📊 强力拆迁前系统总可用空间："
          df -hT
          
          echo "🧨 警告：正在引爆云端的旧有原厂巨兽建筑..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost /usr/share/swift /usr/lib/jvm /usr/share/miniconda /usr/local/share/chromium
          sudo docker image prune --all --force
          
          echo "🎉 新世界建筑彻底清除完毕，已达到物理理论上的清理极值！耗时仅几秒！"
          df -hT

      - name: Initialization environment # 3️⃣：内联 Bash —— 装载工具及雷达扫描异星硬盘
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y --no-install-recommends \
            eatmydata ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 cargo ccache cdrkit-doc clang cmake cpio curl dejagnu device-tree-compiler \
            dos2unix ecj expect fastjar flex g++ g++-multilib gawk gcc gcc-multilib gettext \
            ghc git golang gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 \
            libelf-dev libfido2-dev libffi-dev libfuse-dev libglib2.0-dev libgmp-dev libgmp3-dev \
            libltdl-dev libltdl7 libmpc-dev libmpfr-dev libncurses-dev libncurses5-dev \
            libncursesw5-dev libpcre2-dev libpcre3-dev libpython3-dev libreadline-dev libssl-dev \
            libtext-unidecode-perl libtool libxml-libxml-perl libxml-namespacesupport-perl \
            libxml-sax-base-perl libxml-sax-perl libyaml-dev libz-dev lld llvm lrzsz luajit \
            luarocks make mkisofs msmtp nano ncurses-dev ninja-build openjdk-11-jdk p7zip \
            p7zip-full patch pkgconf pybind11-dev python2.7 python3 python3-dev python3-docutils \
            python3-pip python3-ply python3-pyelftools python3-setuptools qemu-utils re2c rsync \
            ruby-dev rustc scons sgml-base squashfs-tools subversion swig tcl-expect tcl8.6 \
            tex-common texinfo uglifyjs unzip upx-ucl vim wget wodim xmlto xxd zlib1g-dev zstd
          
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          
          echo "🔍 全盘雷达扫描空间最大非系统数据副盘..."
          BEST_DISK=$(df -mP | awk 'NR>1 && $1 ~ /^\/dev\// && $6 != "/" && $6 !~ /boot/ && $4 > 20000 {print $6, $4}' | sort -nr -k2 | awk 'NR==1 {print $1}')
          
          if [ -n "$BEST_DISK" ]; then
            echo "🎉 锁定极品额外数据盘: ${BEST_DISK}"
            export BEST_WORKDIR="${BEST_DISK}/workdir"
          else
            echo "⚠️ 暂无大空间异星盘，回退原生系统大容量主干盘代替..."
            export BEST_WORKDIR="/workdir"
          fi
          
          sudo mkdir -p "$BEST_WORKDIR"
          sudo chown $USER:$GROUPS "$BEST_WORKDIR"
          echo "WORK_DIR=$BEST_WORKDIR" >> $GITHUB_ENV

      - name: Clone openwrt code
        working-directory: ${{ env.WORK_DIR }}
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf ${{ env.WORK_DIR }}/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load and Install custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: Restore Ccache directory
        if: github.event.inputs.use_ccache == 'true' || github.event_name != 'workflow_dispatch'
        uses: actions/cache/restore@v4
        with:
          path: openwrt/.ccache
          key: ${{ runner.os }}-openwrt-ccache-latest

      # ================== 👇 串行第一棒：Taiyi 打底 ==================
      - name: Build Taiyi First # 🍳 让 Taiyi 当先锋，全副武装造工具链
        if: github.event.inputs.build_taiyi == 'true' || github.event_name != 'workflow_dispatch'
        run: |
          cd openwrt
          cp $GITHUB_WORKSPACE/.configtaiyi .config
          
          # 直接在内部向流水线的腹部插入 Ccache 狂魔属性
          echo "CONFIG_DEVEL=y" >> .config
          echo "CONFIG_CCACHE=y" >> .config
          
          make defconfig
          make download -j16
          find dl -size -1024c -delete
          
          echo "🔥 Taiyi 开始全线程开火炼底丹..."
          eatmydata make -j$(($(nproc) + 1)) || eatmydata make -j1 V=s
          
          mkdir -p $GITHUB_WORKSPACE/firmware/Taiyi
          cp -r bin/targets/*/*/*.* $GITHUB_WORKSPACE/firmware/Taiyi/ 2>/dev/null || true

      # ================== 👇 串行第二棒：Yashe 白嫖 ==================
      - name: Build Yashe # 🍳 Yashe 出场，坐拥成堆工具链光速通关！
        if: github.event.inputs.build_yashe == 'true' || github.event_name != 'workflow_dispatch'
        run: |
          cd openwrt
          cp $GITHUB_WORKSPACE/.configyashe .config
          
          echo "CONFIG_DEVEL=y" >> .config
          echo "CONFIG_CCACHE=y" >> .config
          
          make defconfig
          make download -j16
          find dl -size -1024c -delete
          
          echo "🔥 Yashe 开始坐享其成，只编译差异化插件..."
          eatmydata make -j$(($(nproc) + 1)) || eatmydata make -j1 V=s
          
          mkdir -p $GITHUB_WORKSPACE/firmware/Yashe
          cp -r bin/targets/*/*/*.* $GITHUB_WORKSPACE/firmware/Yashe/ 2>/dev/null || true

      - name: Record Build Time # 🏷️ 将成品的生产标签向全国系统广播注册
        id: vars
        run: |
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload Firmware Artifacts # 📦 分发下载框
        uses: actions/upload-artifact@v4
        if: steps.vars.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_Firmware_Combo_${{ env.FILE_DATE }}
          path: $GITHUB_WORKSPACE/firmware

      - name: Generate Release Tag
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && steps.vars.outputs.status == 'success'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")-Combo" >> $GITHUB_OUTPUT
          touch release.txt
          echo "🎉 新鲜出炉的极化单体式同源同心版固件合集！" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Deploy GitHub Release
        if: steps.tag.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.release_tag }}" \
            --title "OpenWrt 纯净同源发行版" \
            --notes-file release.txt \
            $GITHUB_WORKSPACE/firmware/*/*.* || true

      - name: Clear Cloud Ccache Throne # 🧹 内联 Bash: 强杀缓存金刚
        if: success() && (github.event.inputs.use_ccache == 'true' || github.event_name != 'workflow_dispatch')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 正在抹除云端大库旧缓存箱 [ccache-latest]..."
          
          gh api -X GET /repos/${GITHUB_REPOSITORY}/actions/caches?key=${RUNNER_OS}-openwrt-ccache-latest \
            | jq -r '.actions_caches[].id' \
            | awk '{if ($1) system("gh api -X DELETE /repos/'${GITHUB_REPOSITORY}'/actions/caches/" $1)}' || true
            
          gh api -X GET /repos/${GITHUB_REPOSITORY}/actions/caches?per_page=100 \
            | jq -r '.actions_caches[] | select(.key | startswith("${RUNNER_OS}-openwrt-ccache-")) | .id' \
            | awk '{if ($1) system("gh api -X DELETE /repos/'${GITHUB_REPOSITORY}'/actions/caches/" $1)}' || true

      - name: Save Updated Ccache
        if: success() && (github.event.inputs.use_ccache == 'true' || github.event_name != 'workflow_dispatch')
        uses: actions/cache/save@v4
        with:
          path: openwrt/.ccache
          key: ${{ runner.os }}-openwrt-ccache-latest

      - name: Clean Workflow Runs & Releases # 🧹 内联 Bash: 收尸队
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "⚠️ 启动流水线僵尸记录绞肉机..."
          gh run list --limit 500 --json databaseId -q '.[].databaseId' | tail -n +36 | xargs -r gh run delete || true
          
          if [ "$UPLOAD_RELEASE" == "true" ]; then
            echo "⚠️ 启动废弃固件旧版发布清除仪..."
            tags=$(gh release list -L 100 | awk -F '\t' '{print $1}' | tail -n +31)
            if [ -n "$tags" ]; then
              for tag in $tags; do
                echo "🗑️ 正在清除史前发版: $tag"
                gh release delete "$tag" --cleanup-tag -y || true
              done
            fi
          fi
