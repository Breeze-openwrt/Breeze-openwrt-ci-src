name: Update Checker

env:
  REPO_BRANCH: openwrt-22.03

on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * 6

jobs:
  check:
    runs-on: ubuntu-latest
    env: # 🏢 Job 层级变量：直接在本工作中强制开启 Node 24 强力引擎
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

    - name: Get Commit Hash
      id: getHash
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH .
        echo "::set-output name=commitHash::$(git rev-parse HEAD)"

    - name: Compare Commit Hash
      id: cacheHash
      uses: actions/cache@v4
      with:
        path: .commitHash
        key: HEAD-${{ steps.getHash.outputs.commitHash }}

    - name: Save New Commit Hash
      if: steps.cacheHash.outputs.cache-hit != 'true'
      run: |
        echo ${{ steps.getHash.outputs.commitHash }} | tee .commitHash

    - name: Trigger build
      if: steps.cacheHash.outputs.cache-hit != 'true'
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.ACTIONS_TRIGGER_PAT }}
        event-type: Source Code Update

    - name: Delete workflow runs
      # ✨ 高性能原生方案：抛弃 Node 20 老古董，用原生命令秒杀
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 只为探底最新记录，保留 1 条足矣，免去环境依赖烦恼
        gh run list --limit 100 --json databaseId -q '.[].databaseId' | tail -n +2 | xargs -r -I {} gh run delete "{}" || true
